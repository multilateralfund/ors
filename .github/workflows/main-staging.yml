name: "CI-staging"

on:
  push:
    branches:
      - "staging"

  workflow_call:

jobs:
  docker-build:
    uses: ./.github/workflows/docker-build.yml
    with:
      SENTRY_DSN: ${{ vars.STAGING_SENTRY_DSN }}
      SENTRY_ENVIRONMENT: ${{ vars.STAGING_SENTRY_ENVIRONMENT }}
      VITE_TENANT_ID: ${{ secrets.STAGING_VITE_TENANT_ID || '' }}
      VITE_FRONTEND_CLIENT_ID: ${{ secrets.STAGING_VITE_FRONTEND_CLIENT_ID || '' }}
      VITE_APPLICATION_ID_URI: ${{ secrets.STAGING_VITE_APPLICATION_ID_URI || '' }}
  deploy-staging:
    needs: docker-build
    uses: ./.github/workflows/deploy-staging.yml
    secrets:
      STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
